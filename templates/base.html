<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShopEase — Zamonaviy Internet Do'kon{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .nav-link {
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .nav-link:hover {
            color: #0d6efd !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-white bg-white sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand text-primary d-flex align-items-center gap-2" href="{% url 'home' %}">
                <i class="bi bi-bag-heart-fill fs-3"></i>
                <span>ShopEase</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="{% url 'home' %}">
                            <i class="bi bi-house-door me-1"></i> Bosh sahifa
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="{% url 'category_list' %}">
                            <i class="bi bi-grid me-1"></i> Kategoriyalar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="{% url 'product_list' %}">
                            <i class="bi bi-box-seam me-1"></i> Mahsulotlar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-secondary" href="{% url 'order_list' %}">
                            <i class="bi bi-receipt me-1"></i> Buyurtmalarim
                        </a>
                    </li>
                </ul>
                
                <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                    <a href="{% url 'user_profile' %}" class="btn btn-outline-secondary rounded-pill px-3 d-flex align-items-center gap-2">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span>Profil</span>
                    </a>
                    
                    <a href="#" class="btn btn-primary rounded-pill px-3 position-relative">
                        <i class="bi bi-cart3 me-1"></i> Savat
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                            0
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container text-center text-md-between d-md-flex align-items-center justify-content-between">
            <div class="text-muted small mb-2 mb-md-0">
                &copy; 2026 ShopEase Inc. Barcha huquqlar himoyalangan.
            </div>
            <div class="d-flex justify-content-center gap-4 small">
                <a href="#" class="text-decoration-none text-muted">Foydalanish shartlari</a>
                <a href="#" class="text-decoration-none text-muted">Maxfiylik siyosati</a>
                <a href="#" class="text-decoration-none text-muted">Yordam</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
